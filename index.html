<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Diario</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#080710;
  --border:rgba(180,150,255,0.12);
  --gold:#d4a843;
  --gold2:#f0c96a;
  --purple:#9b72ef;
  --purple2:#c4a5ff;
  --text:#e8e0f0;
  --muted:#7a7090;
  --glow-purple:rgba(155,114,239,0.18)
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'EB Garamond',serif;
  min-height:100vh;
}

.wrap{
  max-width:680px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-family:'Playfair Display',serif;
  font-size:2.5rem;
  text-align:center;
  margin-bottom:10px;
}

.panel{
  background:rgba(15,14,26,0.7);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
}

.field{
  margin-bottom:12px;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#9b72ef,#6a42c2);
  color:white;
  cursor:pointer;
}

#ciudadSuggestions{
  display:none;
  position:absolute;
  background:#111;
  border:1px solid var(--border);
  width:100%;
  max-height:200px;
  overflow:auto;
  z-index:10;
}

#ciudadSuggestions div{
  padding:8px;
  cursor:pointer;
}

#ciudadSuggestions div:hover{
  background:rgba(155,114,239,0.2);
}

.loader{display:none;text-align:center;margin-top:20px}
.loader.on{display:block}

.result{display:none;margin-top:20px}
.result.on{display:block}

.error{
  color:#ff7b7b;
  margin-top:10px;
  display:none;
}
.error.on{display:block}
</style>
</head>

<body>

<div class="wrap">

<h1>Astro Diario</h1>

<div class="panel">

<div class="field">
<input type="text" id="nombre" placeholder="Nombre">
</div>

<div class="field">
<input type="date" id="fechaNac">
</div>

<div class="field">
<input type="time" id="horaNac">
</div>

<div class="field" style="position:relative">
<input type="text" id="ciudadNac" placeholder="Ciudad">
<div id="ciudadSuggestions"></div>
<input type="hidden" id="ciudadLat">
<input type="hidden" id="ciudadLon">
<input type="hidden" id="ciudadTz">
</div>

<div class="field">
<select id="enfoque">
<option>General</option>
<option>Trabajo</option>
<option>Amor</option>
</select>
</div>

<button id="btnConsultar">Consultar</button>

<div class="error" id="errorMsg"></div>

</div>

<div class="loader" id="loader">Calculando...</div>

<div class="result" id="result">
<h2 id="rTitle"></h2>
<p id="rFecha"></p>
<div id="rBody"></div>
</div>

</div>

<script>

/* ========= UTIL ========= */

const $ = id => document.getElementById(id);

function moonPhase(){
  const d=(Date.now()-new Date('2000-01-06').getTime())/86400000;
  const p=(d%29.53);
  if(p<15)return {e:'🌒',n:'Creciente'};
  return {e:'🌘',n:'Menguante'};
}

/* ========= AUTOCOMPLETE ========= */

let cityTimer;
let results=[];

$('ciudadNac').addEventListener('input', e=>{
  clearTimeout(cityTimer);
  const q=e.target.value;

  if(q.length<2){
    $('ciudadSuggestions').style.display='none';
    return;
  }

  cityTimer=setTimeout(()=>search(q),300);
});

async function search(q){
  const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
  const data=await res.json();

  const box=$('ciudadSuggestions');
  box.innerHTML='';

  results=data;

  data.slice(0,5).forEach(place=>{
    const div=document.createElement('div');
    div.textContent=place.display_name;

    div.onclick=()=>{
      $('ciudadNac').value=place.display_name;
      $('ciudadLat').value=place.lat;
      $('ciudadLon').value=place.lon;
      box.style.display='none';
    };

    box.appendChild(div);
  });

  box.style.display='block';
}

/* ========= CONSULTA ========= */

$('btnConsultar').addEventListener('click', async ()=>{

  const nombre=$('nombre').value||'Consultante';
  const fecha=$('fechaNac').value;

  if(!fecha){
    $('errorMsg').textContent='Falta fecha';
    $('errorMsg').classList.add('on');
    return;
  }

  $('errorMsg').classList.remove('on');
  $('loader').classList.add('on');

  const moon=moonPhase();

  try{

    const res=await fetch('/api/reading',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:[{role:'user',content:`Lectura para ${nombre}`}]
      })
    });

    const data=await res.json();

    const text=data?.choices?.[0]?.message?.content || 'Sin respuesta';

    $('rTitle').textContent='Lectura de '+nombre;
    $('rFecha').textContent=moon.n;
    $('rBody').textContent=text;

    $('result').classList.add('on');

  }catch(e){
    $('errorMsg').textContent='Error';
    $('errorMsg').classList.add('on');
  }

  $('loader').classList.remove('on');

});

</script>

</body>
</html>
