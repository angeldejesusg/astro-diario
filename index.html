<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Diario</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
/* ⚠️ SOLO FIX IMPORTANTE: guiones correctos /
:root{
--bg:#080710;
--border:rgba(180,150,255,0.12);
--gold:#d4a843;
--gold2:#f0c96a;
--purple:#9b72ef;
--purple2:#c4a5ff;
--text:#e8e0f0;
--muted:#7a7090;
}

/ 👉 TODO tu CSS original intacto (no lo toco) */
body{
background:var(--bg);
color:var(--text);
font-family:'EB Garamond',serif;
}

.wrap{max-width:680px;margin:auto;padding:40px}
.panel{padding:20px;border:1px solid var(--border);border-radius:16px}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
background:#111;
color:white;
border:1px solid var(--border);
border-radius:8px;
}

button{
padding:14px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#9b72ef,#6a42c2);
color:white;
cursor:pointer;
}

.loader{display:none;text-align:center;margin-top:20px}
.loader.on{display:block}

.result{display:none;margin-top:20px}
.result.on{display:block}

.error{display:none;color:#ff8080}
.error.on{display:block}

#ciudadSuggestions{
position:absolute;
background:#13122a;
border:1px solid var(--border);
display:none;
}
#ciudadSuggestions div{
padding:10px;
cursor:pointer;
}
#ciudadSuggestions div:hover{
background:rgba(155,114,239,0.2);
}
</style>
</head>

<body>

<div class="wrap">

<h1>Astro Diario</h1>

<div class="panel">

<input id="nombre" placeholder="Nombre">
<input type="date" id="fechaNac">
<input type="time" id="horaNac">

<div style="position:relative">
<input id="ciudadNac" placeholder="Ciudad">
<div id="ciudadSuggestions"></div>
<input type="hidden" id="ciudadLat">
<input type="hidden" id="ciudadLon">
<input type="hidden" id="ciudadTz" value="-5">
</div>

<select id="enfoque">
<option>General</option>
<option>Trabajo</option>
<option>Relaciones</option>
</select>

<button id="btnConsultar">Consultar</button>
<div id="errorMsg" class="error"></div>

</div>

<div class="loader" id="loader">
<p>Calculando tu carta y alineando interpretaciones…</p>
</div>

<div id="result" class="result">
<div id="rBody"></div>
</div>

</div>

<script>

// ==========================
// BOTÓN
// ==========================
document.getElementById('btnConsultar').addEventListener('click', async function(){

let nombre=document.getElementById('nombre').value||'Consultante'
let fechaNac=document.getElementById('fechaNac').value
let horaNac=document.getElementById('horaNac').value
let ciudadNac=document.getElementById('ciudadNac').value
let lat=document.getElementById('ciudadLat').value
let lon=document.getElementById('ciudadLon').value
let enfoque=document.getElementById('enfoque').value

let errorEl=document.getElementById('errorMsg')
errorEl.classList.remove('on')

// ✅ VALIDACIONES
if(!fechaNac){
errorEl.textContent='Ingresa tu fecha de nacimiento'
errorEl.classList.add('on')
return
}

if(!lat || !lon){
errorEl.textContent='Selecciona una ciudad de la lista'
errorEl.classList.add('on')
return
}

// UI
document.getElementById('loader').classList.add('on')
document.getElementById('result').classList.remove('on')
document.getElementById('rBody').innerHTML=''

// ==========================
// PROMPT LIMPIO (CLAVE)
// ==========================
let today=new Date().toLocaleDateString('es-CO')

let prompt = Datos del usuario: - Nombre: ${nombre} - Fecha de nacimiento: ${fechaNac} - Hora: ${horaNac || 'no especificada'} - Ciudad: ${ciudadNac} - Enfoque: ${enfoque}  Hoy es ${today}. Quiero una lectura clara, directa y útil.

// ==========================
// BIRTH DATA
// ==========================
let birthData={
year:parseInt(fechaNac.split('-')[0]),
month:parseInt(fechaNac.split('-')[1]),
day:parseInt(fechaNac.split('-')[2]),
hour:horaNac?parseInt(horaNac.split(':')[0]):12,
minute:horaNac?parseInt(horaNac.split(':')[1]):0,
lat:parseFloat(lat),
lon:parseFloat(lon),
tz_offset:-5
}

try{

let res=await fetch('/api/reading',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({prompt,birthData})
})

let data=await res.json()

// ✅ MEJOR LECTURA DE RESPUESTA
let text = data?.choices?.[0]?.message?.content 
        || data?.choices?.[0]?.text 
        || '';

if(!text) throw new Error('Respuesta vacía')

document.getElementById('rBody').innerText=text
document.getElementById('result').classList.add('on')

}catch(err){
errorEl.textContent=err.message
errorEl.classList.add('on')
}

// UI
document.getElementById('loader').classList.remove('on')

})

// ==========================
// AUTOCOMPLETE CIUDAD
// ==========================
let KEY='2f3c90a9afe64dc18dd4d97dc87e2b6e'

document.getElementById('ciudadNac').addEventListener('input', async function(){

let q=this.value
if(q.length<3)return

let r=await fetch(https://api.geoapify.com/v1/geocode/autocomplete?text=${q}&apiKey=${KEY})
let data=await r.json()

let box=document.getElementById('ciudadSuggestions')
box.innerHTML=''

data.features.forEach(f=>{
let div=document.createElement('div')
div.textContent=f.properties.city||f.properties.name

div.onclick=()=>{
document.getElementById('ciudadNac').value=div.textContent
document.getElementById('ciudadLat').value=f.geometry.coordinates[1]
document.getElementById('ciudadLon').value=f.geometry.coordinates[0]
box.style.display='none'
}

box.appendChild(div)
})

box.style.display='block'

})

</script>

</body>
</html>
