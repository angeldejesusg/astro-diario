<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Diario</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
:root{--bg:#080710;--border:rgba(180,150,255,0.12);--gold:#d4a843;--gold2:#f0c96a;--purple:#9b72ef;--purple2:#c4a5ff;--text:#e8e0f0;--muted:#7a7090;--glow-purple:rgba(155,114,239,0.18)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',serif}

.wrap{max-width:680px;margin:auto;padding:40px 20px}
.panel{background:rgba(15,14,26,0.7);padding:24px;border-radius:16px;border:1px solid var(--border)}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column}
.field.span2{grid-column:1/-1}

input,select{padding:10px;border-radius:8px;border:1px solid var(--border);background:#111;color:white}

button{margin-top:20px;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#9b72ef,#6a42c2);color:white;cursor:pointer}

.loader{display:none;text-align:center;margin-top:30px}
.loader.on{display:block}

.result{display:none;margin-top:30px}
.result.on{display:block}

.error{display:none;color:#ff8080;margin-top:10px}
.error.on{display:block}

#ciudadSuggestions{position:absolute;background:#13122a;border:1px solid var(--border);border-radius:8px;display:none;max-height:200px;overflow:auto}
#ciudadSuggestions div{padding:8px;cursor:pointer}
#ciudadSuggestions div:hover{background:rgba(155,114,239,0.2)}
</style>
</head>

<body>

<div class="wrap">

<h1>Astro Diario</h1>

<div class="panel">
<div class="fields">

<div class="field span2">
<label>Nombre</label>
<input id="nombre">
</div>

<div class="field">
<label>Fecha</label>
<input type="date" id="fechaNac">
</div>

<div class="field">
<label>Hora</label>
<input type="time" id="horaNac">
</div>

<div class="field span2" style="position:relative">
<label>Ciudad</label>
<input id="ciudadNac">
<div id="ciudadSuggestions"></div>
<input type="hidden" id="ciudadLat">
<input type="hidden" id="ciudadLon">
<input type="hidden" id="ciudadTz" value="-5">
</div>

<div class="field span2">
<select id="enfoque">
<option>General</option>
<option>Trabajo</option>
<option>Relaciones</option>
</select>
</div>

</div>

<button id="btnConsultar">Consultar</button>
<div class="error" id="errorMsg"></div>

</div>

<div class="loader" id="loader">
<p>Calculando tu carta y alineando interpretaciones…</p>
</div>

<div class="result" id="result">
<div id="rBody"></div>
</div>

</div>

<script>
function moonPhase(){
return {e:'🌙',n:'Fase actual'}
}

document.getElementById('btnConsultar').addEventListener('click', async function(){

let nombre=document.getElementById('nombre').value||'Consultante'
let fechaNac=document.getElementById('fechaNac').value
let horaNac=document.getElementById('horaNac').value
let ciudad=document.getElementById('ciudadNac').value
let lat=document.getElementById('ciudadLat').value
let lon=document.getElementById('ciudadLon').value
let enfoque=document.getElementById('enfoque').value

let error=document.getElementById('errorMsg')
error.classList.remove('on')

if(!fechaNac){
error.textContent='Ingresa fecha'
error.classList.add('on')
return
}

if(!lat || !lon){
error.textContent='Selecciona una ciudad de la lista'
error.classList.add('on')
return
}

document.getElementById('loader').classList.add('on')
document.getElementById('result').classList.remove('on')
document.getElementById('rBody').innerHTML=''

let moon=moonPhase()
let today=new Date().toLocaleDateString()

let prompt=`
Datos del usuario:
- Nombre: ${nombre}
- Fecha: ${fechaNac}
- Hora: ${horaNac||'no especificada'}
- Ciudad: ${ciudad}
- Enfoque: ${enfoque}

Hoy es ${today} y la luna está en ${moon.n}.
Quiero una lectura clara, directa y útil.
`

let birthData={
year:parseInt(fechaNac.split('-')[0]),
month:parseInt(fechaNac.split('-')[1]),
day:parseInt(fechaNac.split('-')[2]),
hour:horaNac?parseInt(horaNac.split(':')[0]):12,
minute:horaNac?parseInt(horaNac.split(':')[1]):0,
lat:parseFloat(lat),
lon:parseFloat(lon),
tz_offset:-5
}

try{

let res=await fetch('/api/reading',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({prompt,birthData})
})

let data=await res.json()

let text=data?.choices?.[0]?.message?.content || ''

if(!text) throw new Error('Respuesta vacía')

document.getElementById('rBody').innerText=text
document.getElementById('result').classList.add('on')

}catch(e){
error.textContent=e.message
error.classList.add('on')
}

document.getElementById('loader').classList.remove('on')

})


// Geoapify simple
let KEY='2f3c90a9afe64dc18dd4d97dc87e2b6e'

document.getElementById('ciudadNac').addEventListener('input', async function(){
let q=this.value
if(q.length<3)return

let url=`https://api.geoapify.com/v1/geocode/autocomplete?text=${q}&apiKey=${KEY}`

let r=await fetch(url)
let data=await r.json()

let box=document.getElementById('ciudadSuggestions')
box.innerHTML=''

data.features.forEach(f=>{
let div=document.createElement('div')
div.textContent=f.properties.city||f.properties.name

div.onclick=()=>{
document.getElementById('ciudadNac').value=div.textContent
document.getElementById('ciudadLat').value=f.geometry.coordinates[1]
document.getElementById('ciudadLon').value=f.geometry.coordinates[0]
box.style.display='none'
}

box.appendChild(div)
})

box.style.display='block'
})
</script>

</body>
</html>
